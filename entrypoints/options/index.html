<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infibox Dashboard</title>
    <meta name="manifest.openInTab" content="true">
    <link rel="stylesheet" href="/css/options.css">
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <div class="header-left">
                <div class="logo">i</div>
                <h1>Infibox Dashboard</h1>
            </div>
        </header>

        <section class="card">
            <h2>Settings</h2>
            <form id="settings-form">
                <div class="form-section">
                    <label for="primary-color">Primary Color</label>
                    <p class="field-desc">Choose the accent color used throughout the extension.</p>
                    <input type="color" id="primary-color" name="primary-color" value="#0d9488">
                </div>
                <div class="form-section">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enable-context-menus" name="enable-context-menus">
                        <span>Enable Context Menus</span>
                    </label>
                    <p class="field-desc">Add Infibox utilities to the right-click context menu on any page.</p>
                </div>
                <button type="submit">Save Settings</button>
            </form>
        </section>

        <section class="card">
            <h2>Quick Start</h2>
            <p class="field-desc">Use <kbd>Ctrl+Shift+K</kbd> on any page to open the Infibox command palette.</p>
        </section>
    </div>
    <script type="module" src="./app.js"></script>
</body>
</html>
